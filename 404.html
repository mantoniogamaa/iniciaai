<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta — Página não encontrada</title>
<style>
/*
 * ════════════════════════════════════════════════════════════════
 *  INICIAAÍ — DESIGN SYSTEM UNIFICADO
 *  Paleta oficial Anhembi Morumbi — Polo Bauru-Centro
 *  PANTONE 7719C (#007A5E) · PANTONE 3285C (#00A88E) · Gray 10C (#76787B)
 * ════════════════════════════════════════════════════════════════
 */

/* ── TOKENS ──────────────────────────────────────────────────── */
:root {
  /* Cores Pantone */
  --c-green:        #007A5E;   /* PANTONE 7719C */
  --c-green-dark:   #005C47;
  --c-green-mid:    #006B52;
  --c-mint:         #00A88E;   /* PANTONE 3285C */
  --c-mint-dark:    #008C76;
  --c-mint-light:   #E6F7F4;
  --c-gray:         #76787B;   /* PANTONE Cool Gray 10C */

  /* Superfícies */
  --surface-hero:   #003528;   /* hero background base */
  --surface-dark:   #004D3D;   /* dark sections */
  --surface-bg:     #F4F8F7;   /* page background */
  --surface-white:  #FFFFFF;
  --surface-card:   #FFFFFF;

  /* Texto */
  --text-primary:   #1A2E28;
  --text-secondary: #76787B;
  --text-disabled:  #B0BFB8;
  --text-on-dark:   rgba(255,255,255,.9);
  --text-muted-dark:rgba(255,255,255,.6);

  /* Bordas */
  --border-light:   #D4E5DF;
  --border-card:    #E0EDEA;

  /* Sombras */
  --shadow-sm:  0 2px 8px rgba(0,90,70,.07);
  --shadow-md:  0 8px 24px rgba(0,90,70,.1);
  --shadow-lg:  0 20px 48px rgba(0,90,70,.14);
  --shadow-xl:  0 32px 64px rgba(0,90,70,.18);

  /* Bordas arredondadas */
  --r-sm:  8px;
  --r-md:  14px;
  --r-lg:  20px;
  --r-xl:  28px;
  --r-pill:50px;

  /* Espaçamento */
  --space-xs:  .375rem;
  --space-sm:  .75rem;
  --space-md:  1.5rem;
  --space-lg:  2.5rem;
  --space-xl:  4rem;
  --space-2xl: 6rem;

  /* Transições */
  --t-fast:   .15s ease;
  --t-base:   .25s ease;
  --t-slow:   .4s ease;

  /* Aliases para compatibilidade com código existente */
  --primary:      var(--c-green);
  --primary-dark: var(--c-green-dark);
  --primary-mid:  var(--c-green-mid);
  --accent:       var(--c-mint);
  --accent-dark:  var(--c-mint-dark);
  --accent-light: var(--c-mint-light);
  --gray:         var(--c-gray);
  --gray-light:   #F0F1F2;
  --bg:           var(--surface-bg);
  --dark:         var(--surface-dark);
  --text:         var(--text-primary);
  --muted:        var(--text-secondary);
  --border:       var(--border-light);
  --white:        var(--surface-white);
  --green:        var(--c-mint);
  --orange:       #E65100;
  --yellow:       #F5A623;
  --cyan:         var(--c-mint);
  --violet:       var(--c-green);
  --coral:        var(--c-green-dark);
}

/* ── RESET & BASE ────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', 'Plus Jakarta Sans', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--surface-bg);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

img { max-width: 100%; display: block; }
a { color: inherit; }
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* ── TIPOGRAFIA ──────────────────────────────────────────────── */
h1, h2, h3, h4 {
  font-family: 'Clash Display', sans-serif;
  letter-spacing: -.025em;
  line-height: 1.1;
}

/* ── CONTAINER ───────────────────────────────────────────────── */
.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 2rem;
}
@media(max-width:600px) { .container { padding: 0 1.25rem; } }

/* ── NAV ─────────────────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 100;
  height: 72px;
  background: rgba(255,255,255,.97);
  border-bottom: 1px solid var(--border-light);
  box-shadow: 0 1px 0 rgba(0,122,94,.06);
  backdrop-filter: blur(12px);
  display: flex; align-items: center;
  padding: 0 2rem;
  gap: 2rem;
}

/* Logo */
.nav-logo {
  display: block;
  width: 194px; height: 55px; flex-shrink: 0;
  background: url('logo-conecta-color.png') no-repeat left center / contain;
  font-size: 0; color: transparent;
  text-decoration: none;
  transition: opacity var(--t-base);
}
.nav-logo:hover { opacity: .8; }

/* Links centrais */
.nav-links {
  flex: 1;
  display: flex; align-items: center;
  justify-content: center;
  gap: 2.25rem;
}
.nav-links a {
  font-size: .875rem; font-weight: 500;
  color: var(--text-secondary); text-decoration: none;
  transition: color var(--t-fast);
  position: relative; padding-bottom: 2px;
}
.nav-links a::after {
  content: '';
  position: absolute; bottom: -2px; left: 0; right: 0; height: 2px;
  background: var(--c-mint); border-radius: 2px;
  transform: scaleX(0); transition: transform var(--t-base);
}
.nav-links a:hover { color: var(--c-green); }
.nav-links a:hover::after { transform: scaleX(1); }
.nav-links a.active { color: var(--c-green); font-weight: 700; }
.nav-links a.active::after { transform: scaleX(1); }

/* CTA button */
.nav-cta {
  padding: .55rem 1.4rem;
  background: var(--c-mint);
  color: white; border: none; border-radius: var(--r-pill);
  font-size: .875rem; font-weight: 700;
  text-decoration: none; cursor: pointer;
  transition: background var(--t-base), transform var(--t-base), box-shadow var(--t-base);
  white-space: nowrap;
}
.nav-cta:hover {
  background: var(--c-mint-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(0,168,142,.3);
}

/* Mobile hamburger */
.nav-burger {
  display: none;
  flex-direction: column; gap: 5px;
  background: none; border: none;
  cursor: pointer; padding: .35rem;
  margin-left: auto;
}
.nav-burger span {
  display: block; width: 22px; height: 2px;
  background: var(--text-primary); border-radius: 2px;
  transition: all var(--t-base);
}
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Mobile drawer */
.nav-mobile {
  display: none;
  position: fixed;
  top: 72px; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,.98);
  backdrop-filter: blur(16px);
  z-index: 99;
  flex-direction: column;
  padding: 1.5rem 1.5rem;
  gap: .25rem;
  border-top: 1px solid var(--border-light);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.nav-mobile.open { transform: translateX(0); }
.nav-mobile-link {
  display: flex; align-items: center; gap: .75rem;
  padding: .9rem 1rem; border-radius: var(--r-md);
  font-size: .95rem; font-weight: 600;
  color: var(--text-primary); text-decoration: none;
  transition: background var(--t-fast);
}
.nav-mobile-link:hover { background: var(--c-mint-light); color: var(--c-green); }
.nav-mobile-link svg { color: var(--c-green); flex-shrink: 0; }

/* ── HERO BASE (dark green) ──────────────────────────────────── */
.hero {
  position: relative; overflow: hidden;
  background: linear-gradient(158deg, #002E22 0%, #006B52 55%, #003D2E 100%);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 5rem 2rem 0;
  min-height: calc(100svh - 72px);
}

/* Listras diagonais sutis */
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    -45deg,
    transparent 0px, transparent 28px,
    rgba(255,255,255,.018) 28px, rgba(255,255,255,.018) 29px
  );
  pointer-events: none; z-index: 0;
}

/* Glow central */
.hero::after {
  content: '';
  position: absolute;
  top: 35%; left: 50%; transform: translate(-50%, -50%);
  width: 70%; height: 320px;
  background: radial-gradient(ellipse, rgba(0,168,142,.18) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* Símbolo AM decorativo */
.hero-deco {
  position: absolute;
  right: -2%; bottom: -4%;
  width: min(260px, 26vw);
  aspect-ratio: 700/762;
  background: url('symbol-am-white.png') no-repeat right bottom / contain;
  pointer-events: none; z-index: 0;
  opacity: .9;
}

/* Conteúdo do hero */
.hero-content {
  position: relative; z-index: 1;
  width: 100%; max-width: 780px;
}

.hero-tag {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .4rem 1.1rem;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: var(--r-pill);
  font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .08em;
  color: rgba(255,255,255,.82);
  margin-bottom: 1.5rem;
}

.hero h1 {
  font-size: clamp(2.6rem, 6vw, 4.5rem);
  color: white; font-weight: 700;
  margin-bottom: 1.25rem;
}
.hero h1 .accent { color: var(--c-mint); }

.hero-sub {
  font-size: clamp(.95rem, 1.8vw, 1.1rem);
  color: rgba(255,255,255,.68);
  line-height: 1.75;
  max-width: 520px; margin: 0 auto 2.5rem;
}

/* Hero CTAs */
.hero-ctas {
  display: flex; gap: 1rem;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: 3.5rem;
}
.btn-hero-primary {
  padding: .9rem 2.25rem;
  background: var(--c-mint); color: white;
  border: none; border-radius: var(--r-pill);
  font-weight: 700; font-size: .95rem;
  text-decoration: none; cursor: pointer;
  transition: background var(--t-base), transform var(--t-base), box-shadow var(--t-base);
}
.btn-hero-primary:hover {
  background: var(--c-mint-dark);
  transform: translateY(-3px);
  box-shadow: 0 12px 28px rgba(0,168,142,.35);
}
.btn-hero-ghost {
  padding: .9rem 2.25rem;
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.22);
  color: white; border-radius: var(--r-pill);
  font-weight: 600; font-size: .95rem;
  text-decoration: none; cursor: pointer;
  backdrop-filter: blur(8px);
  transition: all var(--t-base);
}
.btn-hero-ghost:hover {
  background: rgba(255,255,255,.2);
  transform: translateY(-2px);
}

/* Stats bar */
.hero-stats {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: repeat(3, 1fr);
  max-width: 480px; margin: 0 auto;
  background: rgba(0,0,0,.22);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  backdrop-filter: blur(12px);
  overflow: hidden;
}
.hero-stat {
  padding: 1.4rem 1rem; text-align: center;
  border-right: 1px solid rgba(255,255,255,.08);
  transition: background var(--t-fast);
}
.hero-stat:last-child { border-right: none; }
.hero-stat:hover { background: rgba(255,255,255,.07); }
.hero-stat-val {
  font-family: 'Clash Display', sans-serif;
  font-size: 2rem; font-weight: 700; color: white; line-height: 1;
  margin-bottom: .3rem;
}
.hero-stat-lbl { font-size: .7rem; color: rgba(255,255,255,.5); font-weight: 500; }

/* ── WAVE SEPARATOR ──────────────────────────────────────────── */
/* Transição suave de seção: hero escuro → conteúdo branco */
.section-transition {
  display: block; line-height: 0;
  overflow: hidden;
  background: var(--surface-hero);  /* match seção acima */
  margin-bottom: -2px;
}
.section-transition svg { display: block; width: 100%; }

/* ── SECTION BASE ────────────────────────────────────────────── */
.section {
  padding: var(--space-2xl) 0;
}
.section-sm { padding: var(--space-xl) 0; }
.section-dark {
  background: var(--surface-dark);
  padding: var(--space-2xl) 0;
}

/* Section header */
.section-badge {
  display: inline-flex; align-items: center; gap: .4rem;
  padding: .35rem 1rem;
  background: var(--c-mint-light);
  border: 1px solid rgba(0,168,142,.2);
  color: var(--c-green); border-radius: var(--r-pill);
  font-size: .7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .09em;
  margin-bottom: .875rem;
}
.section-badge-dark {
  background: rgba(255,255,255,.1);
  border-color: rgba(255,255,255,.15);
  color: rgba(255,255,255,.75);
}

.section-title {
  font-size: clamp(1.75rem, 3.5vw, 2.6rem);
  color: var(--text-primary); margin-bottom: .75rem;
}
.section-title .accent { color: var(--c-mint); }
.section-title-dark { color: white; }
.section-title-dark .accent { color: var(--c-mint); }

.section-desc {
  font-size: 1rem; color: var(--text-secondary);
  line-height: 1.75; max-width: 540px;
}
.section-desc-dark { color: rgba(255,255,255,.58); }

/* ── CARDS ───────────────────────────────────────────────────── */
.card {
  background: var(--surface-card);
  border: 1.5px solid var(--border-card);
  border-radius: var(--r-lg);
  padding: var(--space-lg);
  transition: transform var(--t-base), box-shadow var(--t-base), border-color var(--t-base);
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: rgba(0,168,142,.3);
}

/* Highlight card (gradiente verde) */
.card-highlight {
  background: linear-gradient(135deg, var(--c-green) 0%, var(--c-mint-dark) 100%);
  border: none; border-radius: var(--r-lg);
  padding: var(--space-lg);
  color: white; position: relative; overflow: hidden;
  transition: transform var(--t-base), box-shadow var(--t-base);
}
.card-highlight::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 85% 15%, rgba(255,255,255,.12), transparent);
  pointer-events: none;
}
.card-highlight:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 48px rgba(0,90,70,.3);
}
.card-highlight > * { position: relative; z-index: 1; }
.card-highlight .card-icon { color: rgba(255,255,255,.65); margin-bottom: .875rem; }
.card-highlight h3 {
  font-family: 'Clash Display', sans-serif;
  font-size: 1.25rem; font-weight: 700; margin-bottom: .4rem;
}
.card-highlight p { font-size: .85rem; opacity: .82; line-height: 1.65; }

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .75rem 1.75rem;
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem; font-weight: 700;
  border: none; border-radius: var(--r-pill);
  cursor: pointer; text-decoration: none;
  transition: all var(--t-base);
}
.btn-primary {
  background: var(--c-mint); color: white;
}
.btn-primary:hover {
  background: var(--c-mint-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,168,142,.32);
}
.btn-secondary {
  background: white; color: var(--c-green);
  border: 1.5px solid var(--border-card);
}
.btn-secondary:hover {
  border-color: var(--c-mint);
  color: var(--c-mint);
  transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}
.btn-ghost-dark {
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.2);
  color: white;
  backdrop-filter: blur(8px);
}
.btn-ghost-dark:hover {
  background: rgba(255,255,255,.2);
  transform: translateY(-2px);
}
.btn-danger {
  background: rgba(183,28,28,.08); color: #B71C1C;
  border: 1.5px solid rgba(183,28,28,.2);
}
.btn-danger:hover { background: #B71C1C; color: white; }
.btn-sm { padding: .5rem 1.1rem; font-size: .82rem; }
.btn-lg { padding: 1rem 2.5rem; font-size: 1rem; }
.btn-block { width: 100%; justify-content: center; }

/* ── FORMS ───────────────────────────────────────────────────── */
.form-group { margin-bottom: 1.25rem; }
.form-label {
  display: block;
  font-size: .78rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-secondary);
  margin-bottom: .5rem;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: .8rem 1.1rem;
  background: white;
  border: 1.5px solid var(--border-light);
  border-radius: var(--r-md);
  font-size: .9rem; color: var(--text-primary);
  transition: border-color var(--t-fast), box-shadow var(--t-fast);
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--c-mint);
  box-shadow: 0 0 0 3px rgba(0,168,142,.12);
}
.form-input::placeholder { color: var(--text-disabled); }

/* ── BADGES / CHIPS ──────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: .3rem;
  padding: .25rem .75rem;
  border-radius: var(--r-pill);
  font-size: .72rem; font-weight: 700;
}
.badge-green   { background: rgba(0,168,142,.12); color: var(--c-mint-dark); }
.badge-primary { background: rgba(0,122,94,.1);   color: var(--c-green); }
.badge-gray    { background: rgba(118,120,123,.12); color: var(--c-gray); }
.badge-yellow  { background: rgba(245,166,35,.12);  color: #92620A; }
.badge-red     { background: rgba(183,28,28,.1);   color: #B71C1C; }

/* ── TOGGLE ──────────────────────────────────────────────────── */
.toggle {
  width: 44px; height: 24px; border-radius: 50px;
  border: none; cursor: pointer; flex-shrink: 0;
  background: var(--border-light);
  position: relative; transition: background var(--t-base);
}
.toggle::after {
  content: ''; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  background: white; top: 3px; left: 3px;
  transition: transform var(--t-base);
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on { background: var(--c-mint); }
.toggle.on::after { transform: translateX(20px); }

/* ── FADE-IN SCROLL ANIMATION ────────────────────────────────── */
.fade-up {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity .6s cubic-bezier(.4,0,.2,1), transform .6s cubic-bezier(.4,0,.2,1);
}
.fade-up.visible { opacity: 1; transform: none; }

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  padding: .875rem 1.25rem;
  border-radius: var(--r-md);
  font-size: .85rem; font-weight: 600; color: white;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
  transform: translateY(80px); opacity: 0;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  z-index: 300; max-width: 320px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { background: var(--c-mint); }
.toast.error   { background: #B71C1C; }
.toast.info    { background: var(--c-green); }

/* ── FOOTER ──────────────────────────────────────────────────── */
.footer {
  background: var(--surface-dark);
  border-top: 1px solid rgba(255,255,255,.08);
  padding: 2.5rem 2rem;
  text-align: center;
}
.footer-logo {
  height: 44px; object-fit: contain;
  opacity: .92;
  margin: 0 auto 1.25rem;
}
.footer-links {
  display: flex; gap: 1.5rem;
  justify-content: center; flex-wrap: wrap;
  margin-bottom: .75rem;
}
.footer-links a {
  font-size: .82rem; color: rgba(255,255,255,.45);
  text-decoration: none; transition: color var(--t-fast);
}
.footer-links a:hover { color: rgba(255,255,255,.85); }
.footer-copy { font-size: .72rem; color: rgba(255,255,255,.22); }

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width: 768px) {
  :root {
    --space-xl:  3rem;
    --space-2xl: 4rem;
  }

  .nav { padding: 0 1.25rem; height: 64px; }
  .nav-logo { width: 130px; height: 40px; }
  .nav-links { display: none !important; }
  .nav-cta  { display: none !important; }
  .nav-burger { display: flex !important; }
  .nav-mobile { display: flex !important; }

  .hero { padding: 3.5rem 1.25rem 0; min-height: 90svh; }
  .hero h1 { font-size: clamp(2rem, 8vw, 2.8rem); }
  .hero-ctas { flex-direction: column; align-items: center; }
  .hero-ctas a, .hero-ctas button { width: 100%; max-width: 280px; text-align: center; justify-content: center; }
  .hero-deco { width: min(160px, 38vw); right: -1%; }
  .hero-stats { grid-template-columns: 1fr 1fr 1fr; max-width: 100%; }

  .section { padding: 3rem 0; }
  .section-dark { padding: 3rem 0; }

  .section-title { font-size: 1.65rem; }
}

@media(max-width: 480px) {
  .hero-stats { grid-template-columns: 1fr; }
