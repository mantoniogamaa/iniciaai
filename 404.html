<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IniciaAí — Página não encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --violet:#7C3AED; --coral:#FF5C5C; --cyan:#06B6D4;
    --bg:#F5F3FF; --dark:#0F0A1E; --text:#1E1B33; --muted:#6B7280; --border:#E5E7EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }

  /* Blobs de fundo */
  .blob {
    position:fixed; border-radius:50%; filter:blur(80px);
    opacity:.18; pointer-events:none; animation:float 8s ease-in-out infinite;
  }
  .blob-1 { width:500px; height:500px; background:var(--violet); top:-150px; right:-100px; animation-delay:0s; }
  .blob-2 { width:400px; height:400px; background:var(--coral);  bottom:-120px; left:-100px; animation-delay:3s; }
  .blob-3 { width:300px; height:300px; background:var(--cyan);   top:40%; left:60%; animation-delay:5s; }
  @keyframes float {
    0%,100% { transform:translateY(0) scale(1); }
    50%      { transform:translateY(-30px) scale(1.05); }
  }

  nav {
    position:fixed; top:0; left:0; right:0;
    padding:0 2rem; height:64px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(245,243,255,.7); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); z-index:10;
  }
  .logo { font-family:'Clash Display',sans-serif; font-size:1.4rem; font-weight:700;
    background:linear-gradient(135deg,var(--violet),var(--coral));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; text-decoration:none; }

  .container {
    text-align:center; padding:2rem; position:relative; z-index:1;
    animation:fadeUp .6s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .four-oh-four {
    font-family:'Clash Display',sans-serif;
    font-size:clamp(7rem,20vw,14rem);
    font-weight:700; line-height:1;
    background:linear-gradient(135deg,var(--violet) 30%,var(--coral) 70%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:.25rem;
    position:relative;
  }
  .four-oh-four::after {
    content:'404';
    position:absolute; inset:0;
    background:linear-gradient(135deg,var(--violet) 30%,var(--coral) 70%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:blur(24px); opacity:.3; z-index:-1;
  }

  .emoji { font-size:3.5rem; margin-bottom:1rem; display:block;
    animation:bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-12px); }
  }

  h1 { font-family:'Clash Display',sans-serif; font-size:clamp(1.5rem,4vw,2.2rem);
    font-weight:700; margin-bottom:.75rem; color:var(--dark); }
  p  { font-size:1rem; color:var(--muted); max-width:420px; margin:0 auto 2rem; line-height:1.7; }

  .btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  .btn-home {
    padding:.8rem 2rem; background:linear-gradient(135deg,var(--violet),var(--coral));
    color:white; border:none; border-radius:50px; font-size:.95rem; font-weight:700;
    cursor:pointer; text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
    transition:transform .2s,box-shadow .2s; display:inline-flex; align-items:center; gap:.5rem;
  }
  .btn-home:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(124,58,237,.35); }
  .btn-back {
    padding:.8rem 2rem; background:white; color:var(--muted);
    border:1.5px solid var(--border); border-radius:50px; font-size:.95rem; font-weight:600;
    cursor:pointer; text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
    transition:all .2s; display:inline-flex; align-items:center; gap:.5rem;
  }
  .btn-back:hover { border-color:var(--violet); color:var(--violet); }

  .hint { margin-top:2.5rem; font-size:.8rem; color:var(--muted); }
  .hint a { color:var(--violet); font-weight:600; text-decoration:none; }
  .hint a:hover { text-decoration:underline; }

  .countdown-bar { width:200px; height:3px; background:var(--border); border-radius:50px;
    margin:1.5rem auto 0; overflow:hidden; }
  .countdown-fill { height:100%; background:linear-gradient(90deg,var(--violet),var(--coral));
    border-radius:50px; animation:shrink 10s linear forwards; }
  @keyframes shrink { from{width:100%} to{width:0%} }
  .countdown-text { font-size:.75rem; color:var(--muted); margin-top:.5rem; }
  #sec { font-weight:700; color:var(--violet); }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<nav>
  <a class="logo" href="index.html">IniciaAí</a>
</nav>

<div class="container">
  <span class="emoji">🔭</span>
  <div class="four-oh-four">404</div>
  <h1>Essa página foi de férias</h1>
  <p>O link que você seguiu pode estar quebrado, desatualizado ou esta página nunca existiu por aqui.</p>

  <div class="btns">
    <a class="btn-home" href="index.html">🏠 Ir para o início</a>
    <a class="btn-back" href="javascript:history.back()">← Voltar</a>
  </div>

  <div class="hint">
    Procurando uma vaga? <a href="index.html">Ver todas as vagas →</a>
  </div>

  <div class="countdown-bar"><div class="countdown-fill"></div></div>
  <div class="countdown-text">Redirecionando em <span id="sec">10</span>s...</div>
</div>

<script>
  let s = 10;
  const interval = setInterval(() => {
    s--;
    document.getElementById('sec').textContent = s;
    if (s <= 0) { clearInterval(interval); window.location.href = 'index.html'; }
  }, 1000);
</script>
</body>
</html>
