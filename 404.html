<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IniciaAí — Página não encontrada</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:       #007A5E;   /* PANTONE 7719C — Verde Escuro Anhembi */
    --primary-dark:  #005C47;   /* Verde mais escuro hover */
    --primary-mid:   #006B52;   /* Verde médio */
    --accent:        #00A88E;   /* PANTONE 3285C — Verde Claro/Menta */
    --accent-dark:   #008C76;   /* Menta escuro hover */
    --accent-light:  #E6F7F4;   /* Menta bem claro fundo */
    --gray:          #76787B;   /* PANTONE Cool Gray 10C */
    --gray-light:    #F0F1F2;   /* Cinza claro */
    --bg:            #F4F8F7;   /* Fundo levemente esverdeado */
    --dark:          #007A5E;   /* Dark = verde escuro */
    --text:          #1A2E28;   /* Texto principal */
    --muted:         #76787B;   /* Cinza médio Anhembi */
    --border:        #C8DDD9;   /* Bordas esverdeadas */
    --white:         #FFFFFF;
    --green:         #00A88E;
    --orange:        #E65100;
    --yellow:        #F57F17;
    --cyan:          #00A88E;
    /* Aliases */
    --violet:        #007A5E;
    --coral:         #005C47;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Plus Jakarta Sans',sans-serif;
    background-image: linear-gradient(155deg, rgba(0,30,22,.94) 0%, rgba(0,80,60,.87) 55%, rgba(0,40,30,.94) 100%), url("bg-network-dark.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed; color:var(--text);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }

  /* Blobs de fundo */
  .blob {
    position:fixed; border-radius:50%; filter:blur(80px);
    opacity:.18; pointer-events:none; animation:float 8s ease-in-out infinite;
  }
  .blob-1 { width:500px; height:500px; background:var(--violet); top:-150px; right:-100px; animation-delay:0s; }
  .blob-2 { width:400px; height:400px; background:var(--coral);  bottom:-120px; left:-100px; animation-delay:3s; }
  .blob-3 { width:300px; height:300px; background:var(--cyan);   top:40%; left:60%; animation-delay:5s; }
  @keyframes float {
    0%,100% { transform:translateY(0) scale(1); }
    50%      { transform:translateY(-30px) scale(1.05); }
  }

  nav {
    position:fixed; top:0; left:0; right:0;
    padding:0 2rem; height:64px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(245,243,255,.7); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border); z-index:10;
  }
  .logo { font-family:'Clash Display',sans-serif; font-size:1.4rem; font-weight:700;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    -webkit-background-clip:text; -webkit-text-fill-color:var(--primary);
    background-clip:text; text-decoration:none; }

  .container {
    text-align:center; padding:2rem; position:relative; z-index:1;
    animation:fadeUp .6s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .four-oh-four {
    font-family:'Clash Display',sans-serif;
    font-size:clamp(7rem,20vw,14rem);
    font-weight:700; line-height:1;
    background:linear-gradient(135deg,var(--violet) 30%,var(--coral) 70%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:.25rem;
    position:relative;
  }
  .four-oh-four::after {
    content:'404';
    position:absolute; inset:0;
    background:linear-gradient(135deg,var(--violet) 30%,var(--coral) 70%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:blur(24px); opacity:.3; z-index:-1;
  }

  .emoji { font-size:3.5rem; margin-bottom:1rem; display:block;
    animation:bounce 2s ease-in-out infinite; }
  @keyframes bounce {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-12px); }
  }

  h1 { font-family:'Clash Display',sans-serif; font-size:clamp(1.5rem,4vw,2.2rem);
    font-weight:700; margin-bottom:.75rem; color:var(--dark); }
  p  { font-size:1rem; color:var(--muted); max-width:420px; margin:0 auto 2rem; line-height:1.7; }

  .btns { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
  .btn-home {
    padding:.8rem 2rem; background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:white; border:none; border-radius:50px; font-size:.95rem; font-weight:700;
    cursor:pointer; text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
    transition:transform .2s,box-shadow .2s; display:inline-flex; align-items:center; gap:.5rem;
  }
  .btn-home:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(12,61,48,.45); }
  .btn-back {
    padding:.8rem 2rem; background:white; color:var(--muted);
    border:1.5px solid var(--border); border-radius:50px; font-size:.95rem; font-weight:600;
    cursor:pointer; text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
    transition:all .2s; display:inline-flex; align-items:center; gap:.5rem;
  }
  .btn-back:hover { border-color:var(--violet); color:var(--violet); }

  .hint { margin-top:2.5rem; font-size:.8rem; color:var(--muted); }
  .hint a { color:var(--violet); font-weight:600; text-decoration:none; }
  .hint a:hover { text-decoration:underline; }

  .countdown-bar { width:200px; height:3px; background:var(--border); border-radius:50px;
    margin:1.5rem auto 0; overflow:hidden; }
  .countdown-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-dark));
    border-radius:50px; animation:shrink 10s linear forwards; }
  @keyframes shrink { from{width:100%} to{width:0%} }
  .countdown-text { font-size:.75rem; color:var(--muted); margin-top:.5rem; }
  #sec { font-weight:700; color:var(--violet); }

  
  .hero, .page-hero, .vaga-hero, .doc-hero {
    background: linear-gradient(135deg, #004D3D 0%, var(--primary) 50%, #0A3528 100%) !important;
    position: relative;
    overflow: hidden;
  }

  /* Padrão de pontos/grid sutil */
  .hero::after, .page-hero::after, .vaga-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(46,207,168,.15) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Linhas diagonais sutis */
  .hero::before, .page-hero::before, .vaga-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(46,207,168,.08) 25%, transparent 25%,
        transparent 50%, rgba(46,207,168,.08) 50%, rgba(46,207,168,.08) 75%,
        transparent 75%, transparent),
      radial-gradient(ellipse 80% 50% at 80% 50%, rgba(46,207,168,.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(12,61,48,.6) 0%, transparent 60%);
    background-size: 60px 60px, 100% 100%, 100% 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* Garante conteúdo interno acima dos pseudoelementos */
  .hero > *, .page-hero > *, .vaga-hero > * {
    position: relative;
    z-index: 1;
  }
  .hero-inner, .page-hero-inner, .hero-inner * {
    position: relative;
    z-index: 2;
  }


  
  /* ── PAGE HERO PANTONE ANHEMBI ── */
  .page-hero, .vaga-hero, .doc-hero {
    background: linear-gradient(155deg, #004D3D 0%, #007A5E 55%, #005C47 100%) !important;
    position: relative; overflow: hidden;
  }
  .page-hero::before, .vaga-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,168,142,.12) 1px, transparent 1px);
    background-size: 38px 38px; pointer-events: none; z-index: 0;
  }
  .page-hero::after, .vaga-hero::after {
    content: ''; position: absolute;
    top: -40px; right: -40px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(0,168,142,.25) 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .page-hero > *, .vaga-hero > * { position: relative; z-index: 1; }
  .page-hero h1, .vaga-hero h1 { color: white !important; }
  .page-hero h1 span, .vaga-hero h1 span {
    color: var(--accent) !important;
    -webkit-text-fill-color: var(--accent) !important;
  }
  .page-hero p, .vaga-hero p { color: rgba(255,255,255,.65) !important; }
  .page-hero-badge {
    background: rgba(255,255,255,.1) !important;
    border: 1px solid rgba(255,255,255,.18) !important;
    color: rgba(255,255,255,.8) !important;
  }
  .logo { color: var(--primary) !important; -webkit-text-fill-color: var(--primary) !important; background: none !important; }
  nav { background: rgba(255,255,255,.97) !important; box-shadow: 0 1px 12px rgba(0,122,94,.1) !important; }


  /* ── LOGO IMAGEM ANHEMBI ── */
  .logo {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    cursor: pointer;
    color: transparent !important;
    -webkit-text-fill-color: transparent !important;
    background: none !important;
    font-size: 0 !important;
  }
  .logo::before {
    content: '';
    display: block;
    width: 160px;
    height: 44px;
    background: url('logo-colorida.png') no-repeat center/contain;
  }
  /* Logo branca nos heróis (quando nav está sobre fundo escuro) */
  .hero-logo-wrap .logo::before,
  .vaga-hero .logo::before {
    background-image: url('logo-branca.png');
  }


  /* ── FIX GLOBAL: eliminar vermelho, logo correta, marca d'água ── */
  .logo {
    display: inline-flex; align-items: center;
    text-decoration: none; cursor: pointer;
    font-size: 0 !important; color: transparent !important;
    -webkit-text-fill-color: transparent !important; background: none !important;
  }
  .logo::before {
    content: '';
    display: block;
    width: 140px; height: 44px;
    background: url('logo-colorida.png') no-repeat left center / contain;
  }
  nav {
    background: rgba(255,255,255,.97) !important;
    box-shadow: 0 1px 16px rgba(0,122,94,.1) !important;
    height: 72px !important;
  }

  /* Todos os botões CTA → verde accent */
  .btn-submit, .btn-save, .btn-modal-save, .lm-btn,
  .btn-apply-full, .btn-apply, .btn-search, .btn-buscar,
  .btn-nova-vaga, .btn-nav-cta, .btn-hero-primary, .btn-nav-primary,
  .cta-btn-a, .btn-primary {
    background: var(--accent) !important;
    background-image: none !important;
  }
  .btn-submit:hover, .btn-save:hover, .btn-apply-full:hover,
  .btn-search:hover, .btn-buscar:hover, .btn-hero-primary:hover {
    background: var(--accent-dark) !important;
    box-shadow: 0 8px 20px rgba(0,168,142,.3) !important;
  }

  /* Input focus → accent */
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(0,168,142,.1) !important;
  }

  /* Section badge */
  .section-badge {
    background: var(--accent-light) !important;
    color: var(--primary) !important;
  }

  /* Section title span highlight */
  .section-title span, h1 span, h2 span {
    color: var(--accent) !important;
    -webkit-text-fill-color: var(--accent) !important;
    background: none !important;
  }

  /* Stat nums brancos dentro de heróis */
  .hero .stat-num, .page-hero .stat-num {
    color: white !important;
    font-weight: 800 !important;
  }

  /* Remove qualquer gradiente texto residual */
  *[style*="background-clip:text"] {
    -webkit-background-clip: unset !important;
    -webkit-text-fill-color: unset !important;
    background-clip: unset !important;
  }


  /* ── UPGRADE TIPOGRAFIA GLOBAL ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');

  body { font-family: 'DM Sans', 'Plus Jakarta Sans', sans-serif !important; }

  h1, h2, h3, .section-title, .panel-title, .modal-title {
    font-family: 'Clash Display', sans-serif !important;
    letter-spacing: -0.02em !important;
  }

  /* Forms mais elegantes */
  input, select, textarea, button {
    font-family: 'DM Sans', sans-serif !important;
  }

  /* Labels mais profissionais */
  label { font-size: .8rem !important; font-weight: 700 !important; letter-spacing: .03em !important; }

  /* Botões — tipografia impactante */
  .btn-submit, .btn-save, .btn-primary, .btn-login,
  .btn-apply-full, .btn-search, .btn-buscar, .btn-nav-cta {
    font-family: 'DM Sans', sans-serif !important;
    font-weight: 700 !important;
    letter-spacing: .02em !important;
  }

  /* Nav links */
  .nav-links a, .nav-back {
    font-family: 'DM Sans', sans-serif !important;
    font-size: .875rem !important;
  }

  /* Form cards */
  .form-card { border-radius: 20px !important; }
  .section-label { letter-spacing: -.01em !important; }


  /* 404 dark bg text fixes */
  body { color: white !important; }
  h2 { color: white !important; }
  .not-found p, .hint { color: rgba(255,255,255,.65) !important; }
  .hint a { color: var(--accent) !important; }
  .btn-back { background: rgba(255,255,255,.1) !important; color: white !important; border-color: rgba(255,255,255,.2) !important; }
  .countdown-bar { background: rgba(255,255,255,.15) !important; }
  .countdown-text { color: rgba(255,255,255,.5) !important; }
  #sec { color: var(--accent) !important; }

  /* ── SÍMBOLO AM — página interna ── */
  .page-hero, .vaga-hero { position:relative; overflow:hidden; }
  .page-am-deco {
    position:absolute; right:-60px; bottom:-50px;
    width:320px; height:348px;
    background:url('symbol-am-white.png') no-repeat center/contain;
    pointer-events:none; z-index:0;
  }
  @media(max-width:768px){
    .page-am-deco { width:160px!important; right:-20px!important; }
  }

</style>
</head>

<div class="blob blob-3"></div>

<nav>
