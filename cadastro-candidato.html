function switchTab(tab) {
  document.getElementById('tab-cadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
  document.getElementById('tab-login').style.display    = tab === 'login'    ? 'block' : 'none';

async function hashSenha(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function cadastrar() {

  btn.disabled = true; btn.textContent = 'Criando conta...';

  const hash = await hashSenha(senha);
  const { data, error } = await sb.from('candidatos').insert({
    nome, email, telefone: v('c-tel'), cidade: v('c-cidade'), estado: v('c-estado'),
    data_nascimento: v('c-nasc') || null, escolaridade: v('c-esc'),
    curso: v('c-curso'), instituicao: v('c-inst'), periodo_disponivel: v('c-periodo'),
    sobre: v('c-sobre'), linkedin: v('c-linkedin'), senha_hash: hash
  }).select().single();

  if (error) {
    const msg_txt = error.code === '23505' ? 'Este e-mail já está cadastrado. Faça login.' : 'Erro ao criar conta. Tente novamente.';
    showMsg(msg, msg_txt, 'error');
    btn.disabled = false; btn.textContent = 'Criar minha conta 🚀';
    return;
  }

  sessionStorage.setItem('candidato', JSON.stringify(data));
  candidatoLogado = data;
  showMsg(msg, '✅ Conta criada com sucesso!', 'success');
  setTimeout(showPainel, 1000);
}

async function login() {
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('msg-login');
  const email = document.getElementById('l-email').value.trim();
  const senha = document.getElementById('l-senha').value;

  if (!email || !senha) { showMsg(msg,'Preencha e-mail e senha.','error'); return; }

  btn.disabled = true; btn.textContent = 'Entrando...';
  const hash = await hashSenha(senha);

  const { data, error } = await sb.from('candidatos')
    .select('*').eq('email', email).eq('senha_hash', hash).maybeSingle();

  if (error || !data) {
    showMsg(msg, 'E-mail ou senha incorretos.', 'error');
    btn.disabled = false; btn.textContent = 'Entrar →';
    return;
  }

  sessionStorage.setItem('candidato', JSON.stringify(data));
  candidatoLogado = data;
  showPainel();
}

function showPainel() {
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('tab-cadastro').style.display = 'none';
  document.getElementById('tab-login').style.display = 'none';
  document.getElementById('painel').classList.add('show');
  document.getElementById('painel-nome').textContent = candidatoLogado.nome.split(' ')[0];
  loadCandidaturas();
  preencherFormPerfil();
}

// ---- PAINEL TABS ----
function switchPainelTab(tab, el) {
  document.querySelectorAll('.edit-section').forEach(s => s.classList.remove('show'));
  document.querySelectorAll('.painel-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('show');
  el.classList.add('active');
}

// ---- CANDIDATURAS ----
async function loadCandidaturas() {
  const { data, error } = await sb.from('candidaturas')
    .select('*, vagas(id, titulo, tipo, cidade, modalidade, empresas(nome_fantasia))')
    .eq('candidato_id', candidatoLogado.id)
    .order('created_at', { ascending: false });

  document.getElementById('cands-loading').style.display = 'none';
  const list = document.getElementById('cands-list');

  if (error || !data?.length) {
    list.innerHTML = `<div class="empty-cands"><div>📭</div><strong>Nenhuma candidatura ainda</strong><br><span style="font-size:.85rem">Explore as vagas e candidate-se!</span><br><br><a href="index.html" style="color:var(--violet);font-weight:600;">Ver vagas →</a></div>`;
    return;
  }

  const statusLabel = { em_analise:'⏳ Em análise', aprovado:'✅ Aprovado', recusado:'❌ Recusado' };
  list.innerHTML = data.map(c => {
    const vg = c.vagas;
    const emp = vg?.empresas?.nome_fantasia || '—';
    const initial = emp.charAt(0).toUpperCase();
    return `
      <div class="cand-card" style="cursor:pointer" onclick="window.location.href='vaga.html?id=${vg?.id}'">
        <div class="cand-logo">${initial}</div>
        <div class="cand-info">
          <div class="cand-title">${vg?.titulo || '—'}</div>
          <div class="cand-meta">${emp} · ${vg?.cidade || '—'} · ${vg?.modalidade || '—'}</div>
        </div>
        <span class="status-badge s-${c.status}">${statusLabel[c.status]||c.status}</span>
      </div>`;
  }).join('');
}

// ---- EDITAR PERFIL ----
function preencherFormPerfil() {
  const cd = candidatoLogado;
  // header
  document.getElementById('edit-avatar').textContent = cd.nome?.charAt(0)?.toUpperCase() || '?';
  document.getElementById('edit-nome-display').textContent = cd.nome || '—';
  document.getElementById('edit-email-display').textContent = cd.email || '—';
  // campos
  sv('e-nome',    cd.nome);
  sv('e-tel',     cd.telefone);
  sv('e-nasc',    cd.data_nascimento);
  sv('e-estado',  cd.estado);
  sv('e-cidade',  cd.cidade);
  sv('e-periodo', cd.periodo_disponivel);
  sv('e-esc',     cd.escolaridade);
  sv('e-curso',   cd.curso);
  sv('e-inst',    cd.instituicao);
  sv('e-linkedin',cd.linkedin);
  sv('e-sobre',   cd.sobre);
}

function sv(id, val) {
  const el = document.getElementById(id);
  if (el && val) el.value = val;
}

function cancelEditPerfil() {
  preencherFormPerfil();
  document.getElementById('msg-perfil').style.display = 'none';
}

async function salvarPerfil() {
  const btn = document.getElementById('btn-salvar-perfil');
  const msg = document.getElementById('msg-perfil');
  const nome = document.getElementById('e-nome').value.trim();
  if (!nome) { showMsgInline(msg,'Nome é obrigatório.','error'); return; }

  btn.disabled = true; btn.textContent = 'Salvando...';

  const updates = {
    nome,
    telefone:          v('e-tel'),
    data_nascimento:   v('e-nasc') || null,
    estado:            v('e-estado'),
    cidade:            v('e-cidade'),
    periodo_disponivel:v('e-periodo'),
    escolaridade:      v('e-esc'),
    curso:             v('e-curso'),
    instituicao:       v('e-inst'),
    linkedin:          v('e-linkedin'),
    sobre:             v('e-sobre'),
  };

  const { data, error } = await sb.from('candidatos')
    .update(updates).eq('id', candidatoLogado.id).select().single();

  if (error) {
    showMsgInline(msg,'Erro ao salvar. Tente novamente.','error');
    btn.disabled = false; btn.textContent = 'Salvar alterações ✓';
    return;
  }

  candidatoLogado = data;
  sessionStorage.setItem('candidato', JSON.stringify(data));
  document.getElementById('painel-nome').textContent = data.nome.split(' ')[0];
  preencherFormPerfil();
  showMsgInline(msg,'✅ Perfil atualizado com sucesso!','success');
  btn.disabled = false; btn.textContent = 'Salvar alterações ✓';
}

// ---- ALTERAR SENHA ----
async function alterarSenha() {
  const btn = document.getElementById('btn-salvar-senha');
  const msg = document.getElementById('msg-senha');
  const atual    = document.getElementById('s-atual').value;
  const nova     = document.getElementById('s-nova').value;
  const confirma = document.getElementById('s-confirma').value;

  if (!atual || !nova || !confirma) { showMsgInline(msg,'Preencha todos os campos.','error'); return; }
  if (nova.length < 6) { showMsgInline(msg,'A nova senha deve ter pelo menos 6 caracteres.','error'); return; }
  if (nova !== confirma) { showMsgInline(msg,'As senhas não coincidem.','error'); return; }

  btn.disabled = true; btn.textContent = 'Verificando...';

  const hashAtual = await hashSenha(atual);
  // Verificar senha atual
  const { data: check } = await sb.from('candidatos')
    .select('id').eq('id', candidatoLogado.id).eq('senha_hash', hashAtual).maybeSingle();

  if (!check) {
    showMsgInline(msg,'Senha atual incorreta.','error');
    btn.disabled = false; btn.textContent = 'Alterar senha ✓';
    return;
  }

  const hashNova = await hashSenha(nova);
  const { error } = await sb.from('candidatos')
    .update({ senha_hash: hashNova }).eq('id', candidatoLogado.id);

  if (error) {
    showMsgInline(msg,'Erro ao alterar senha.','error');
  } else {
    showMsgInline(msg,'✅ Senha alterada com sucesso!','success');
    document.getElementById('s-atual').value = '';
    document.getElementById('s-nova').value = '';
    document.getElementById('s-confirma').value = '';
  }
  btn.disabled = false; btn.textContent = 'Alterar senha ✓';
}

// ---- UTILS ----
function logout() {
  sessionStorage.removeItem('candidato');
  location.reload();
}

function showMsg(el, txt, type) { el.textContent = txt; el.className = `msg-box ${type}`; }
function showMsgInline(el, txt, type) { el.textContent = txt; el.className = `msg-inline ${type}`; }
function v(id) { return document.getElementById(id)?.value?.trim() || ''; }

// Auto-login se já tiver sessão
if (candidatoLogado) showPainel();
</script>
</body>
</html>
