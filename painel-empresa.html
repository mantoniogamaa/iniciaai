async function hashSenha(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function loginEmpresa() {
  const btn = document.getElementById('btn-login-emp');
  const msg = document.getElementById('msg-login');
  const email = document.getElementById('e-email').value.trim();

  btn.disabled = true; btn.textContent = 'Entrando...';
  const hash = await hashSenha(senha);

  const { data, error } = await sb.from('empresas')
    .select('*').eq('email', email).eq('senha_hash', hash).maybeSingle();

  if (error || !data) {
    showMsg(msg,'E-mail ou senha incorretos.','error');
    btn.disabled = false; btn.textContent = 'Entrar →'; return;
  }

  sessionStorage.setItem('empresa', JSON.stringify(data));
  empresaLogada = data;
  showPainel();
}

function showPainel() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('painel-empresa').classList.add('show');
  document.getElementById('nav-logout').style.display = 'block';
  document.getElementById('emp-nome').textContent = empresaLogada.nome_fantasia;
  document.getElementById('emp-setor').textContent = empresaLogada.setor || 'Painel de gerenciamento';
  loadVagas();
}

async function loadVagas() {
  const { data, error } = await sb.from('vagas')
    .select('*').eq('empresa_id', empresaLogada.id).order('created_at', {ascending:false});

  document.getElementById('vagas-loading').style.display = 'none';

  todasVagas = data || [];
  document.getElementById('s-total').textContent = todasVagas.filter(v=>v.status==='aprovada'||v.status==='encerrada').length;
  loadAllStats();
  renderVagas();
}

async function loadAllStats() {
  const ids = todasVagas.map(v=>v.id);
  if (!ids.length) return;
  const { data } = await sb.from('candidaturas').select('status').in('vaga_id', ids);
  const total = data?.length || 0;
  const analise = data?.filter(c=>c.status==='em_analise').length || 0;
  document.getElementById('s-cands').textContent = total;
  document.getElementById('s-analise').textContent = analise;
}

function renderVagas() {
  const list = document.getElementById('vagas-list');
  if (!todasVagas.length) {
    list.innerHTML = `<div class="empty-msg"><div>📭</div>Nenhuma vaga cadastrada ainda.<br><a href="cadastro-empresa.html" style="color:var(--violet);font-weight:600;">Cadastrar nova vaga →</a></div>`;
    return;
  }
  const statusLabel = {pendente:'⏳ Pendente', aprovada:'✅ Aprovada', rejeitada:'❌ Rejeitada', encerrada:'🔒 Encerrada'};
  const statusClass = {pendente:'b-pendente', aprovada:'b-aprovada', rejeitada:'b-rejeitada', encerrada:'b-encerrada'};
  list.innerHTML = todasVagas.map(v => {
    const actions = `
      <div class="vaga-actions" onclick="event.stopPropagation()">
        <button class="btn-vaga-action btn-edit" onclick="abrirEdicao('${v.id}')">✏️ Editar</button>
        ${v.status === 'aprovada'
          ? `<button class="btn-vaga-action btn-close" onclick="encerrarVaga('${v.id}')">🔒 Encerrar</button>`
          : v.status === 'encerrada'
          ? `<button class="btn-vaga-action btn-reopen" onclick="reabrirVaga('${v.id}')">🔓 Reabrir</button>`
          : ''}
        <button class="btn-vaga-action btn-del" onclick="excluirVaga('${v.id}')">🗑️ Excluir</button>
        <button class="btn-vaga-action btn-edit" style="border-color:rgba(6,182,212,.3);color:#0891B2;background:rgba(6,182,212,.06)" onclick="selectVaga('${v.id}')">👥 Candidatos</button>
      </div>`;
    return `
    <div class="vaga-item ${vagaSelecionada===v.id?'selected':''}">
      <div class="vaga-item-header">
        <div>
          <div class="vaga-title">${v.titulo}</div>
          <div class="vaga-meta">${v.tipo} · ${v.area} · ${v.cidade} · R$ ${Number(v.bolsa||0).toLocaleString('pt-BR')}/mês</div>
        </div>
        <span class="badge ${statusClass[v.status]||''}">${statusLabel[v.status]||v.status}</span>
      </div>
      ${actions}
    </div>`;
  }).join('');
}

// ---- EDITAR VAGA ----
function abrirEdicao(vagaId) {
  const v = todasVagas.find(x => x.id === vagaId);
  if (!v) return;
  document.getElementById('edit-vaga-id').value = vagaId;
  setVal('edit-titulo',    v.titulo);
  setVal('edit-tipo',      v.tipo);
  setVal('edit-area',      v.area);
  setVal('edit-modalidade',v.modalidade);
  setVal('edit-cidade',    v.cidade);
  setVal('edit-periodo',   v.periodo);
  setVal('edit-horas',     v.horas);
  setVal('edit-esc',       v.escolaridade);
  setVal('edit-bolsa',     v.bolsa);
  setVal('edit-numvagas',  v.num_vagas);
  setVal('edit-descricao', v.descricao);
  setVal('edit-requisitos',v.requisitos);
  setVal('edit-prazo',     v.prazo);
  document.getElementById('msg-modal-edit').style.display = 'none';
  document.getElementById('modal-editar').classList.add('open');
}

function setVal(id, val) { const el = document.getElementById(id); if(el && val !== null && val !== undefined) el.value = val; }

async function salvarEdicao() {
  const btn = document.getElementById('btn-salvar-edicao');
  const msg = document.getElementById('msg-modal-edit');
  const vagaId = document.getElementById('edit-vaga-id').value;
  const titulo = document.getElementById('edit-titulo').value.trim();
  if (!titulo) { showMsgModal(msg,'Título é obrigatório.','error'); return; }

  btn.disabled = true; btn.textContent = 'Salvando...';

  const updates = {
    titulo,
    tipo:        gv('edit-tipo'),
    area:        gv('edit-area'),
    modalidade:  gv('edit-modalidade'),
    cidade:      gv('edit-cidade'),
    periodo:     gv('edit-periodo'),
    horas:       gv('edit-horas'),
    escolaridade:gv('edit-esc'),
    bolsa:       Number(gv('edit-bolsa')) || 0,
    num_vagas:   Number(gv('edit-numvagas')) || 1,
    descricao:   gv('edit-descricao'),
    requisitos:  gv('edit-requisitos'),
    prazo:       gv('edit-prazo'),
  };

  const { error } = await sb.from('vagas').update(updates).eq('id', vagaId);
  if (error) {
    showMsgModal(msg, 'Erro ao salvar. Tente novamente.', 'error');
    btn.disabled = false; btn.textContent = 'Salvar alterações ✓';
    return;
  }

  // Atualiza cache local
  const idx = todasVagas.findIndex(v => v.id === vagaId);
  if (idx !== -1) todasVagas[idx] = { ...todasVagas[idx], ...updates };

  showMsgModal(msg, '✅ Vaga atualizada com sucesso!', 'success');
  btn.disabled = false; btn.textContent = 'Salvar alterações ✓';
  renderVagas();
  setTimeout(() => fecharEdicao(), 1200);
}

function fecharEdicao() {
  document.getElementById('modal-editar').classList.remove('open');
}

// ---- ENCERRAR / REABRIR ----
async function encerrarVaga(vagaId) {
  if (!confirm('Encerrar esta vaga? Ela sairá do portal mas ficará no seu histórico.')) return;
  const { error } = await sb.from('vagas').update({ status: 'encerrada' }).eq('id', vagaId);
  if (error) { showToast('Erro ao encerrar.', 'error'); return; }
  const v = todasVagas.find(x => x.id === vagaId);
  if (v) v.status = 'encerrada';
  showToast('🔒 Vaga encerrada.', 'success');
  renderVagas(); loadAllStats();
}

async function reabrirVaga(vagaId) {
  if (!confirm('Reabrir esta vaga? Ela voltará a aparecer no portal.')) return;
  const { error } = await sb.from('vagas').update({ status: 'aprovada' }).eq('id', vagaId);
  if (error) { showToast('Erro ao reabrir.', 'error'); return; }
  const v = todasVagas.find(x => x.id === vagaId);
  if (v) v.status = 'aprovada';
  showToast('🔓 Vaga reaberta!', 'success');
  renderVagas(); loadAllStats();
}

async function excluirVaga(vagaId) {
  const v = todasVagas.find(x => x.id === vagaId);
  if (!confirm(`Excluir permanentemente "${v?.titulo}"? Esta ação não pode ser desfeita.`)) return;
  const { error } = await sb.from('vagas').delete().eq('id', vagaId);
  if (error) { showToast('Erro ao excluir.', 'error'); return; }
  todasVagas = todasVagas.filter(x => x.id !== vagaId);
  if (vagaSelecionada === vagaId) {
    vagaSelecionada = null;
    document.getElementById('candidatos-panel').style.display = 'none';
  }
  showToast('🗑️ Vaga excluída.', 'error');
  renderVagas(); loadAllStats();
}

function showMsgModal(el, txt, type) { el.textContent = txt; el.className = `msg-modal ${type}`; }
function gv(id) { return document.getElementById(id)?.value?.trim() || ''; }

async function selectVaga(vagaId) {
  vagaSelecionada = vagaId;
  renderVagas();

  const vaga = todasVagas.find(v=>v.id===vagaId);
  const panel = document.getElementById('candidatos-panel');
  panel.style.display = 'block';
  document.getElementById('cands-title').textContent = `Candidatos para: ${vaga?.titulo}`;
  document.getElementById('cands-loading2').style.display = 'block';
  document.getElementById('cands-list').innerHTML = '';
  panel.scrollIntoView({behavior:'smooth', block:'start'});

  const { data, error } = await sb.from('candidaturas')
    .select('*, candidatos(nome, email, telefone, cidade, estado, escolaridade, curso, periodo_disponivel, linkedin, sobre)')
    .eq('vaga_id', vagaId).order('created_at', {ascending:false});

  document.getElementById('cands-loading2').style.display = 'none';
  const list = document.getElementById('cands-list');

  if (error || !data?.length) {
    list.innerHTML = '<div class="empty-msg"><div>👀</div>Nenhum candidato ainda para esta vaga.</div>';
    return;
  }

  const statusLabel = {em_analise:'⏳ Em análise', aprovado:'✅ Aprovado', recusado:'❌ Recusado'};
  list.innerHTML = data.map(c => {
    const cd = c.candidatos;
    const initial = cd?.nome?.charAt(0)?.toUpperCase() || '?';
    const actions = c.status === 'em_analise'
      ? `<button class="btn-sm btn-approve" onclick="updateCand('${c.id}','aprovado')">Aprovar</button>
         <button class="btn-sm btn-reject"  onclick="updateCand('${c.id}','recusado')">Recusar</button>`
      : `<span class="status-badge s-${c.status}">${statusLabel[c.status]}</span>`;
    return `
      <div class="cand-row" id="cand-${c.id}">
        <div class="cand-avatar">${initial}</div>
        <div class="cand-info">
          <div class="cand-name">${cd?.nome||'—'}</div>
          <div class="cand-meta">
            📧 ${cd?.email||'—'} · 📍 ${cd?.cidade||'—'}${cd?.estado?', '+cd.estado:''}<br>
            🎓 ${cd?.escolaridade||'—'}${cd?.curso?' · '+cd.curso:''} · 🕐 ${cd?.periodo_disponivel||'—'}
            ${cd?.linkedin ? ` · <a href="${cd.linkedin}" target="_blank" style="color:var(--violet)">LinkedIn</a>` : ''}
          </div>
          ${cd?.sobre ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.3rem;font-style:italic">"${cd.sobre.substring(0,100)}${cd.sobre.length>100?'...':''}"</div>` : ''}
        </div>
        <div class="cand-actions">${actions}</div>
      </div>`;
  }).join('');
}

async function updateCand(candId, newStatus) {
  const { error } = await sb.from('candidaturas').update({status: newStatus}).eq('id', candId);
  if (error) { showToast('Erro ao atualizar.','error'); return; }
  showToast(newStatus==='aprovado' ? '✅ Candidato aprovado!' : '❌ Candidato recusado.', newStatus==='aprovado'?'success':'error');
  selectVaga(vagaSelecionada);
  loadAllStats();
}

function logout() {
  sessionStorage.removeItem('empresa');
  location.reload();
}

function showMsg(el, txt, type) { el.textContent = txt; el.className = `msg-box ${type}`; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`;
  void t.offsetWidth; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

if (empresaLogada) showPainel();
</script>
</body>
</html>
