<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IniciaAí — Painel da Empresa</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --violet:#7C3AED; --coral:#FF5C5C; --green:#10B981; --yellow:#FBBF24;
    --bg:#F5F3FF; --dark:#0F0A1E; --text:#1E1B33; --muted:#6B7280; --border:#E5E7EB;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  nav { background:rgba(245,243,255,.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
    padding:0 2rem; height:64px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10; }
  .logo { font-family:'Clash Display',sans-serif; font-size:1.4rem; font-weight:700;
    background:linear-gradient(135deg,var(--violet),var(--coral));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }

  .page-wrap { max-width:960px; margin:0 auto; padding:2.5rem 1.5rem 5rem; }

  /* LOGIN */
  .login-wrap { max-width:420px; margin:0 auto; }
  .login-header { text-align:center; margin-bottom:2rem; }
  .login-header h1 { font-family:'Clash Display',sans-serif; font-size:2rem; font-weight:700; margin-bottom:.5rem; }
  .login-header p { color:var(--muted); font-size:.95rem; }
  .form-card { background:white; border-radius:20px; padding:2rem; border:1.5px solid var(--border);
    box-shadow:0 4px 24px rgba(0,0,0,.06); }
  .form-group { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
  label { font-size:.8rem; font-weight:600; }
  input, select, textarea {
    width:100%; padding:.75rem 1rem; border:1.5px solid var(--border); border-radius:10px;
    font-size:.9rem; font-family:'Plus Jakarta Sans',sans-serif; outline:none;
    background:var(--bg); color:var(--text); transition:border-color .2s,box-shadow .2s;
  }
  input:focus, select:focus { border-color:var(--violet); box-shadow:0 0 0 3px rgba(124,58,237,.1); background:white; }
  .btn-primary { width:100%; padding:1rem; background:linear-gradient(135deg,var(--violet),var(--coral));
    color:white; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif; transition:transform .2s,box-shadow .2s; margin-top:.5rem; }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,58,237,.35); }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; transform:none; }
  .msg-box { padding:.75rem 1rem; border-radius:10px; font-size:.85rem; font-weight:600;
    margin-top:1rem; text-align:center; display:none; }
  .msg-box.error { background:rgba(255,92,92,.1); color:var(--coral); display:block; }
  .link-cadastro { text-align:center; margin-top:1.25rem; font-size:.85rem; color:var(--muted); }
  .link-cadastro a { color:var(--violet); font-weight:600; text-decoration:none; }

  /* PAINEL */
  .painel { display:none; }
  .painel.show { display:block; animation:fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .painel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:1rem; }
  .painel-header h1 { font-family:'Clash Display',sans-serif; font-size:1.8rem; font-weight:700; }
  .painel-header p { color:var(--muted); font-size:.9rem; margin-top:.15rem; }
  .btn-logout { padding:.5rem 1.2rem; background:white; border:1.5px solid var(--border);
    border-radius:8px; font-size:.8rem; font-weight:600; cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif; color:var(--muted); transition:all .2s; }
  .btn-logout:hover { border-color:var(--coral); color:var(--coral); }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
  .stat-card { background:white; border-radius:14px; padding:1.25rem; border:1px solid var(--border); text-align:center; }
  .stat-num { font-family:'Clash Display',sans-serif; font-size:2rem; font-weight:700; color:var(--violet); }
  .stat-label { font-size:.78rem; color:var(--muted); font-weight:500; margin-top:.2rem; }

  .vagas-section { margin-bottom:2rem; }
  .section-title { font-family:'Clash Display',sans-serif; font-size:1.2rem; font-weight:700; margin-bottom:1rem; }

  .vaga-item { background:white; border-radius:14px; padding:1.25rem; border:1.5px solid var(--border);
    margin-bottom:.75rem; cursor:pointer; transition:border-color .2s,box-shadow .2s; }
  .vaga-item:hover { border-color:rgba(124,58,237,.3); box-shadow:0 4px 16px rgba(0,0,0,.07); }
  .vaga-item.selected { border-color:var(--violet); box-shadow:0 0 0 3px rgba(124,58,237,.1); }
  .vaga-item-header { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
  .vaga-title { font-weight:700; font-size:.95rem; }
  .vaga-meta  { font-size:.78rem; color:var(--muted); margin-top:.2rem; }
  .badge { padding:.25rem .7rem; border-radius:50px; font-size:.72rem; font-weight:600; }
  .b-pendente  { background:rgba(251,191,36,.15); color:#B45309; }
  .b-aprovada  { background:rgba(16,185,129,.15); color:var(--green); }
  .b-rejeitada { background:rgba(255,92,92,.15); color:var(--coral); }

  .cands-count { font-size:.8rem; color:var(--muted); margin-top:.5rem; }

  /* CANDIDATOS PANEL */
  .candidatos-panel { background:white; border-radius:20px; border:1.5px solid var(--border);
    padding:1.5rem; margin-top:1.5rem; }
  .candidatos-panel h3 { font-family:'Clash Display',sans-serif; font-size:1.1rem; margin-bottom:1rem; }

  .cand-row { display:flex; align-items:center; gap:1rem; padding:1rem;
    border-radius:12px; border:1px solid var(--border); margin-bottom:.6rem; transition:border-color .2s; }
  .cand-row:hover { border-color:rgba(124,58,237,.2); }
  .cand-avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--violet),var(--coral));
    display:flex; align-items:center; justify-content:center; color:white;
    font-family:'Clash Display',sans-serif; font-weight:700; font-size:1.1rem; flex-shrink:0; }
  .cand-info { flex:1; min-width:0; }
  .cand-name { font-weight:700; font-size:.9rem; }
  .cand-meta { font-size:.75rem; color:var(--muted); margin-top:.15rem; }
  .cand-actions { display:flex; gap:.5rem; flex-shrink:0; }
  .btn-sm { padding:.35rem .8rem; border-radius:7px; font-size:.75rem; font-weight:700;
    cursor:pointer; border:none; font-family:'Plus Jakarta Sans',sans-serif; transition:all .2s; }
  .btn-approve { background:rgba(16,185,129,.15); color:var(--green); }
  .btn-approve:hover { background:var(--green); color:white; }
  .btn-reject  { background:rgba(255,92,92,.1); color:var(--coral); }
  .btn-reject:hover  { background:var(--coral); color:white; }
  .status-badge { padding:.25rem .75rem; border-radius:50px; font-size:.72rem; font-weight:700; }
  .s-em_analise { background:rgba(251,191,36,.15); color:#B45309; }
  .s-aprovado   { background:rgba(16,185,129,.15); color:var(--green); }
  .s-recusado   { background:rgba(255,92,92,.15); color:var(--coral); }

  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--violet);
    border-radius:50%; animation:spin .8s linear infinite; margin:2rem auto; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty-msg { text-align:center; padding:2rem; color:var(--muted); font-size:.9rem; }
  .empty-msg div { font-size:2rem; margin-bottom:.5rem; }

  /* TOAST */
  .toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:.85rem 1.25rem; border-radius:12px;
    font-size:.85rem; font-weight:600; color:white; box-shadow:0 8px 24px rgba(0,0,0,.2);
    transform:translateY(80px); opacity:0; transition:all .3s; z-index:200; }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { background:var(--green); }
  .toast.error   { background:var(--coral); }

  @media(max-width:600px) { .stats-row{grid-template-columns:1fr 1fr} .cand-actions{flex-direction:column} }
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">IniciaAí</a>
  <button class="btn-logout" id="nav-logout" onclick="logout()" style="display:none">Sair</button>
</nav>

<div class="page-wrap">

  <!-- LOGIN EMPRESA -->
  <div id="login-section">
    <div class="login-wrap">
      <div class="login-header">
        <h1>🏢 Área da Empresa</h1>
        <p>Acesse para gerenciar suas vagas e visualizar os candidatos.</p>
      </div>
      <div class="form-card">
        <div class="form-group"><label>E-mail cadastrado</label><input type="email" id="e-email" placeholder="rh@empresa.com.br" onkeydown="if(event.key==='Enter')loginEmpresa()"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="e-senha" placeholder="Sua senha" onkeydown="if(event.key==='Enter')loginEmpresa()"></div>
        <button class="btn-primary" id="btn-login-emp" onclick="loginEmpresa()">Entrar →</button>
        <div class="msg-box" id="msg-login"></div>
      </div>
      <div class="link-cadastro">Ainda não tem conta? <a href="cadastro-empresa.html">Cadastre sua empresa</a></div>
    </div>
  </div>

  <!-- PAINEL EMPRESA -->
  <div class="painel" id="painel-empresa">
    <div class="painel-header">
      <div>
        <h1 id="emp-nome">Empresa</h1>
        <p id="emp-setor">Painel de gerenciamento</p>
      </div>
      <button class="btn-logout" onclick="logout()">Sair da conta</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="s-total">0</div><div class="stat-label">Vagas publicadas</div></div>
      <div class="stat-card"><div class="stat-num" id="s-cands">0</div><div class="stat-label">Total candidaturas</div></div>
      <div class="stat-card"><div class="stat-num" id="s-analise">0</div><div class="stat-label">Em análise</div></div>
    </div>

    <div class="vagas-section">
      <div class="section-title">Suas Vagas</div>
      <div id="vagas-loading"><div class="spinner"></div></div>
      <div id="vagas-list"></div>
    </div>

    <div class="candidatos-panel" id="candidatos-panel" style="display:none">
      <h3 id="cands-title">Candidatos</h3>
      <div id="cands-loading2"><div class="spinner"></div></div>
      <div id="cands-list"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://hnhxxchhwhdlpuiceirz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuaHh4Y2hod2hkbHB1aWNlaXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjY4MDMsImV4cCI6MjA4OTAwMjgwM30._N9DBrCq7lXW6tpfpcXHHcaH21AqEAcinPPIE-_-Ik8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let empresaLogada = JSON.parse(sessionStorage.getItem('empresa') || 'null');
let vagaSelecionada = null;
let todasVagas = [];

async function hashSenha(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function loginEmpresa() {
  const btn = document.getElementById('btn-login-emp');
  const msg = document.getElementById('msg-login');
  const email = document.getElementById('e-email').value.trim();
  const senha = document.getElementById('e-senha').value;
  if (!email || !senha) { showMsg(msg,'Preencha e-mail e senha.','error'); return; }

  btn.disabled = true; btn.textContent = 'Entrando...';
  const hash = await hashSenha(senha);

  const { data, error } = await sb.from('empresas')
    .select('*').eq('email', email).eq('senha_hash', hash).maybeSingle();

  if (error || !data) {
    showMsg(msg,'E-mail ou senha incorretos.','error');
    btn.disabled = false; btn.textContent = 'Entrar →'; return;
  }

  sessionStorage.setItem('empresa', JSON.stringify(data));
  empresaLogada = data;
  showPainel();
}

function showPainel() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('painel-empresa').classList.add('show');
  document.getElementById('nav-logout').style.display = 'block';
  document.getElementById('emp-nome').textContent = empresaLogada.nome_fantasia;
  document.getElementById('emp-setor').textContent = empresaLogada.setor || 'Painel de gerenciamento';
  loadVagas();
}

async function loadVagas() {
  const { data, error } = await sb.from('vagas')
    .select('*').eq('empresa_id', empresaLogada.id).order('created_at', {ascending:false});

  document.getElementById('vagas-loading').style.display = 'none';

  todasVagas = data || [];
  document.getElementById('s-total').textContent = todasVagas.filter(v=>v.status==='aprovada').length;
  loadAllStats();
  renderVagas();
}

async function loadAllStats() {
  const ids = todasVagas.map(v=>v.id);
  if (!ids.length) return;
  const { data } = await sb.from('candidaturas').select('status').in('vaga_id', ids);
  const total = data?.length || 0;
  const analise = data?.filter(c=>c.status==='em_analise').length || 0;
  document.getElementById('s-cands').textContent = total;
  document.getElementById('s-analise').textContent = analise;
}

function renderVagas() {
  const list = document.getElementById('vagas-list');
  if (!todasVagas.length) {
    list.innerHTML = `<div class="empty-msg"><div>📭</div>Nenhuma vaga cadastrada ainda.<br><a href="cadastro-empresa.html" style="color:var(--violet);font-weight:600;">Cadastrar nova vaga →</a></div>`;
    return;
  }
  const statusLabel = {pendente:'⏳ Pendente', aprovada:'✅ Aprovada', rejeitada:'❌ Rejeitada'};
  const statusClass = {pendente:'b-pendente', aprovada:'b-aprovada', rejeitada:'b-rejeitada'};
  list.innerHTML = todasVagas.map(v => `
    <div class="vaga-item ${vagaSelecionada===v.id?'selected':''}" onclick="selectVaga('${v.id}')">
      <div class="vaga-item-header">
        <div>
          <div class="vaga-title">${v.titulo}</div>
          <div class="vaga-meta">${v.tipo} · ${v.area} · ${v.cidade} · R$ ${Number(v.bolsa||0).toLocaleString('pt-BR')}/mês</div>
        </div>
        <span class="badge ${statusClass[v.status]||''}">${statusLabel[v.status]||v.status}</span>
      </div>
      <div class="cands-count">Clique para ver os candidatos →</div>
    </div>`).join('');
}

async function selectVaga(vagaId) {
  vagaSelecionada = vagaId;
  renderVagas();

  const vaga = todasVagas.find(v=>v.id===vagaId);
  const panel = document.getElementById('candidatos-panel');
  panel.style.display = 'block';
  document.getElementById('cands-title').textContent = `Candidatos para: ${vaga?.titulo}`;
  document.getElementById('cands-loading2').style.display = 'block';
  document.getElementById('cands-list').innerHTML = '';
  panel.scrollIntoView({behavior:'smooth', block:'start'});

  const { data, error } = await sb.from('candidaturas')
    .select('*, candidatos(nome, email, telefone, cidade, estado, escolaridade, curso, periodo_disponivel, linkedin, sobre)')
    .eq('vaga_id', vagaId).order('created_at', {ascending:false});

  document.getElementById('cands-loading2').style.display = 'none';
  const list = document.getElementById('cands-list');

  if (error || !data?.length) {
    list.innerHTML = '<div class="empty-msg"><div>👀</div>Nenhum candidato ainda para esta vaga.</div>';
    return;
  }

  const statusLabel = {em_analise:'⏳ Em análise', aprovado:'✅ Aprovado', recusado:'❌ Recusado'};
  list.innerHTML = data.map(c => {
    const cd = c.candidatos;
    const initial = cd?.nome?.charAt(0)?.toUpperCase() || '?';
    const actions = c.status === 'em_analise'
      ? `<button class="btn-sm btn-approve" onclick="updateCand('${c.id}','aprovado')">Aprovar</button>
         <button class="btn-sm btn-reject"  onclick="updateCand('${c.id}','recusado')">Recusar</button>`
      : `<span class="status-badge s-${c.status}">${statusLabel[c.status]}</span>`;
    return `
      <div class="cand-row" id="cand-${c.id}">
        <div class="cand-avatar">${initial}</div>
        <div class="cand-info">
          <div class="cand-name">${cd?.nome||'—'}</div>
          <div class="cand-meta">
            📧 ${cd?.email||'—'} · 📍 ${cd?.cidade||'—'}${cd?.estado?', '+cd.estado:''}<br>
            🎓 ${cd?.escolaridade||'—'}${cd?.curso?' · '+cd.curso:''} · 🕐 ${cd?.periodo_disponivel||'—'}
            ${cd?.linkedin ? ` · <a href="${cd.linkedin}" target="_blank" style="color:var(--violet)">LinkedIn</a>` : ''}
          </div>
          ${cd?.sobre ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.3rem;font-style:italic">"${cd.sobre.substring(0,100)}${cd.sobre.length>100?'...':''}"</div>` : ''}
        </div>
        <div class="cand-actions">${actions}</div>
      </div>`;
  }).join('');
}

async function updateCand(candId, newStatus) {
  const { error } = await sb.from('candidaturas').update({status: newStatus}).eq('id', candId);
  if (error) { showToast('Erro ao atualizar.','error'); return; }
  showToast(newStatus==='aprovado' ? '✅ Candidato aprovado!' : '❌ Candidato recusado.', newStatus==='aprovado'?'success':'error');
  selectVaga(vagaSelecionada);
  loadAllStats();
}

function logout() {
  sessionStorage.removeItem('empresa');
  location.reload();
}

function showMsg(el, txt, type) { el.textContent = txt; el.className = `msg-box ${type}`; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type}`;
  void t.offsetWidth; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

if (empresaLogada) showPainel();
</script>
</body>
</html>
